# CANNECT.AI Computer Vision Analytics Configuration

# API Configuration
api:
  base_url: 'https://cannect.ai/api'
  # base_url: 'http://localhost:3000/api'  # For local development
  endpoints:
    analytics: '/analytics/live'
    campaign_analytics: '/campaigns/{campaign_id}/analytics'
  auth_token: ''  # Set via environment variable CANNECT_API_TOKEN

# Camera Configuration (4 cameras: 2 per vending × 2 vendings)
cameras:
  vending_1:
    location: 'Kazakhstan'  # Will move to Dubai next week
    station_id: 'vending_001'
    camera_1:
      id: 'vending_001_cam_1'
      stream_url: 'rtsp://192.168.1.101:8554/cam1'  # Replace with actual Raspberry Pi stream
      position: 'front'
      fps: 15
      resolution: [1920, 1080]
    camera_2:
      id: 'vending_001_cam_2'
      stream_url: 'rtsp://192.168.1.101:8554/cam2'
      position: 'side'
      fps: 15
      resolution: [1920, 1080]

  vending_2:
    location: 'Kazakhstan'
    station_id: 'vending_002'
    camera_1:
      id: 'vending_002_cam_1'
      stream_url: 'rtsp://192.168.1.102:8554/cam1'
      position: 'front'
      fps: 15
      resolution: [1920, 1080]
    camera_2:
      id: 'vending_002_cam_2'
      stream_url: 'rtsp://192.168.1.102:8554/cam2'
      position: 'side'
      fps: 15
      resolution: [1920, 1080]

# Analytics Configuration
analytics:
  # Traffic & Footfall
  traffic_counting:
    enabled: true
    detect_people: true
    detect_vehicles: true
    confidence_threshold: 0.5
    track_movement_direction: true
    calculate_speed: true

  # Attention Metrics
  attention_tracking:
    enabled: true
    dwell_time_threshold: 2.0  # seconds
    attention_zone_distance: 5.0  # meters (approximate)
    track_unique_viewers: true
    generate_heatmaps: true

  # Demographics (Anonymized)
  demographics:
    enabled: true
    detect_age: true
    detect_gender: true
    anonymize_data: true  # No facial recognition, no biometric storage

  # Emotion Analysis (Optional)
  emotion_analysis:
    enabled: false  # Set to true to enable
    emotions: ['joy', 'interest', 'surprise', 'neutral']

  # 360° Camera Coordination
  multi_camera:
    enabled: true
    cross_camera_tracking: true
    merge_overlapping_detections: true

# YOLO Model Configuration
model:
  name: 'yolov8n.pt'  # Nano model for faster inference on CPU
  # name: 'yolov8s.pt'  # Small model (better accuracy, slower)
  device: 'cpu'  # Will be 'cuda' when GPU is available
  confidence: 0.5
  iou_threshold: 0.45

# Processing Configuration
processing:
  batch_size: 1
  frame_skip: 2  # Process every Nth frame to reduce CPU load
  buffer_size: 30  # frames
  send_interval: 10  # Send analytics every N seconds

# Logging
logging:
  level: 'INFO'
  file: 'logs/cv_analytics.log'
  max_size: '100MB'
  backup_count: 5
